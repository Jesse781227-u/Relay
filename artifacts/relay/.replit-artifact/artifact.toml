kind = "web"
previewPath = "/"
title = "Relay"
version = "1.0.0"
id = "artifacts/relay"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22062

[services.development]
run = "pnpm --filter @workspace/relay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/relay", "run", "build" ]
serve = "static"
publicDir = "artifacts/relay/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22062"
BASE_PATH = "/"
